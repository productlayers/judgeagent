<svg width="1440" height="940" viewBox="0 0 1440 940" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Relay action view mockup</title>
  <desc id="desc">A simplified action-first UI mockup for auditing one multi-agent handoff, showing the selected edge, why it was blocked, and the next actions to repair the agent flow.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#101b1e" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f5f7f6; }
      .ink { fill: #111d20; }
      .muted { fill: #667477; }
      .panel { fill: #ffffff; stroke: #d8e0e1; stroke-width: 1; filter: url(#shadow); }
      .flat { fill: #ffffff; stroke: #d8e0e1; stroke-width: 1; }
      .soft { fill: #eef4f3; }
      .dark { fill: #111d20; }
      .red { fill: #b42343; }
      .red-soft { fill: #fae7ec; }
      .green { fill: #1f7a4d; }
      .green-soft { fill: #e5f4eb; }
      .amber { fill: #a96400; }
      .amber-soft { fill: #fff1d6; }
      .blue { fill: #296d98; }
      .blue-soft { fill: #e4f1f8; }
      .redis { fill: #dc382d; }
      .line { stroke: #cbd5d6; stroke-width: 2; fill: none; }
      .line-red { stroke: #b42343; stroke-width: 5; fill: none; }
      .line-green { stroke: #1f7a4d; stroke-width: 5; fill: none; }
      .h1 { font: 900 42px Inter, Arial, sans-serif; letter-spacing: 0; }
      .h2 { font: 850 26px Inter, Arial, sans-serif; letter-spacing: 0; }
      .h3 { font: 800 18px Inter, Arial, sans-serif; letter-spacing: 0; }
      .body { font: 500 15px Inter, Arial, sans-serif; letter-spacing: 0; }
      .body-strong { font: 800 15px Inter, Arial, sans-serif; letter-spacing: 0; }
      .small { font: 850 11px Inter, Arial, sans-serif; letter-spacing: 0; text-transform: uppercase; }
      .tiny { font: 750 10px Inter, Arial, sans-serif; letter-spacing: 0; }
      .mono { font: 650 12px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="940"/>

  <!-- Header -->
  <rect class="dark" x="32" y="28" width="1376" height="96" rx="0"/>
  <text class="small" x="64" y="62" fill="#9fd8cf">Agent Relay</text>
  <text class="h1" x="64" y="101" fill="#ffffff">Planner said done. Judge said not yet.</text>
  <text class="body" x="790" y="68" fill="#b9c8ca">Selected trust boundary</text>
  <text class="h3" x="790" y="96" fill="#ffffff">planner -> booker</text>
  <circle class="redis" cx="1260" cy="76" r="8"/>
  <text class="body" x="1278" y="82" fill="#ffffff">Redis live replay</text>

  <!-- Left: flow and setup -->
  <rect class="panel" x="32" y="152" width="310" height="744" rx="6"/>
  <text class="small" x="64" y="188" fill="#296d98">Flow under audit</text>
  <text class="h2 ink" x="64" y="222">travel_v1</text>
  <text class="body muted" x="64" y="250">Generic import stays here. The review focuses on one edge at a time.</text>

  <rect class="soft" x="64" y="292" width="246" height="58" rx="5" stroke="#d2dcdd"/>
  <text class="small muted" x="84" y="316">Input source</text>
  <text class="mono ink" x="84" y="338">LangGraph state</text>

  <rect class="flat" x="64" y="394" width="246" height="260" rx="6"/>
  <circle class="blue-soft" cx="120" cy="462" r="36" stroke="#c4deea"/>
  <text class="h3 ink" x="91" y="468">Planner</text>
  <circle class="amber-soft" cx="246" cy="462" r="36" stroke="#e6c67b"/>
  <text class="h3 ink" x="222" y="468">Judge</text>
  <path class="line-red" d="M156 462 C176 462 190 462 210 462"/>
  <text class="small red" x="152" y="437">blocked</text>
  <circle class="soft" cx="182" cy="562" r="36" stroke="#cbd5d6"/>
  <text class="h3 muted" x="157" y="568">Booker</text>
  <path class="line" d="M232 496 C218 522 204 540 190 552"/>
  <text class="small muted" x="215" y="545">locked</text>

  <rect class="red-soft" x="64" y="704" width="246" height="94" rx="6" stroke="#efbec8"/>
  <text class="small" x="86" y="734" fill="#b42343">Current route</text>
  <text class="h3 ink" x="86" y="764">Return to Planner</text>
  <text class="body muted" x="86" y="786">Do not let Booker run yet.</text>

  <!-- Center: decision and insight -->
  <rect class="panel" x="374" y="152" width="646" height="744" rx="6"/>
  <text class="small" x="414" y="190" fill="#b42343">Judge decision</text>
  <text class="h1 red" x="414" y="244">BLOCK BOOKER</text>
  <text class="h2 ink" x="414" y="292">The handoff is unsafe because the budget proof is missing.</text>

  <rect class="red-soft" x="414" y="334" width="566" height="112" rx="6" stroke="#efbec8"/>
  <text class="small" x="444" y="366" fill="#b42343">Most actionable insight</text>
  <text class="h3 ink" x="444" y="398">The planner claims the trip is under $6,000, but the evidence does not include flights or a summed total.</text>
  <text class="body muted" x="444" y="426">Root cause: the planner prompt asks for a plan, not a proof package.</text>

  <text class="small" x="414" y="492" fill="#087f7a">What Judge checked</text>
  <g>
    <rect class="flat" x="414" y="516" width="566" height="62" rx="5"/>
    <circle class="red" cx="444" cy="547" r="8"/>
    <text class="body-strong ink" x="464" y="543">Budget cap</text>
    <text class="body muted" x="464" y="565">Asserted, not calculated. Booker cannot trust spend.</text>
    <text class="small red" x="860" y="552">critical</text>
  </g>
  <g>
    <rect class="flat" x="414" y="592" width="566" height="62" rx="5"/>
    <circle class="red" cx="444" cy="623" r="8"/>
    <text class="body-strong ink" x="464" y="619">Flights</text>
    <text class="body muted" x="464" y="641">Required by the goal, absent from evidence.</text>
    <text class="small red" x="860" y="628">missing</text>
  </g>
  <g>
    <rect class="flat" x="414" y="668" width="566" height="62" rx="5"/>
    <circle class="amber" cx="444" cy="699" r="8"/>
    <text class="body-strong ink" x="464" y="695">Dietary constraints</text>
    <text class="body muted" x="464" y="717">Mentioned lightly, not proven in itinerary choices.</text>
    <text class="small amber" x="836" y="704">unsupported</text>
  </g>

  <rect class="green-soft" x="414" y="774" width="566" height="74" rx="6" stroke="#cbe8d5"/>
  <text class="small" x="444" y="804" fill="#1f7a4d">After fix, expected route</text>
  <text class="h3 ink" x="444" y="832">Retry only Planner. If the proof package passes, unlock Booker.</text>

  <!-- Right: action queue -->
  <rect class="panel" x="1052" y="152" width="356" height="744" rx="6"/>
  <text class="small" x="1084" y="188" fill="#296d98">Action queue</text>
  <text class="h2 ink" x="1084" y="222">Next move is obvious</text>

  <rect class="blue-soft" x="1084" y="262" width="292" height="128" rx="6" stroke="#c7e1ef"/>
  <text class="small" x="1110" y="294" fill="#296d98">Recommended</text>
  <text class="h3 ink" x="1110" y="324">Request proof package</text>
  <text class="body muted" x="1110" y="350">Ask Planner for flights, total cost math, and dietary evidence.</text>
  <rect class="blue" x="1110" y="366" width="136" height="38" rx="5"/>
  <text class="body-strong" x="1136" y="391" fill="#ffffff">Send request</text>

  <rect class="flat" x="1084" y="424" width="292" height="126" rx="6"/>
  <text class="small" x="1110" y="456" fill="#087f7a">Patch prompt</text>
  <text class="mono ink" x="1110" y="486">+ Return an evidence table</text>
  <text class="mono ink" x="1110" y="510">+ Show budget arithmetic</text>
  <text class="mono ink" x="1110" y="534">+ Mark unmet constraints</text>

  <rect class="green-soft" x="1084" y="584" width="138" height="54" rx="5" stroke="#cbe8d5"/>
  <text class="body-strong green" x="1110" y="617">Retry node</text>
  <rect class="amber-soft" x="1238" y="584" width="138" height="54" rx="5" stroke="#efcf8f"/>
  <text class="body-strong amber" x="1266" y="617">Human</text>

  <rect class="soft" x="1084" y="678" width="292" height="92" rx="6" stroke="#d2dcdd"/>
  <text class="small muted" x="1110" y="710">Make it permanent</text>
  <text class="body-strong ink" x="1110" y="738">Create eval guard from this failure</text>
  <text class="body muted" x="1110" y="760">Prevent future planners from passing without budget proof.</text>

  <rect class="dark" x="1084" y="810" width="292" height="54" rx="5"/>
  <circle class="redis" cx="1110" cy="837" r="7"/>
  <text class="mono" x="1128" y="841" fill="#ffffff">criterion.failed -> action.created</text>
</svg>
